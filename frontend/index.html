<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Payment Solutions Built for Growth - Accept payments globally with enterprise-grade security, lightning-fast processing, and powerful analytics." />
    <title>Sompay | Payments made easy for everyone</title>
    <!-- Preload critical fonts with swap display to ensure text visibility -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"></noscript>
    <!-- Inline critical CSS for above-the-fold content -->
    <style>
      :root {
        --primary-gold: #c9a227;
        --primary-gold-light: #d4af37;
        --primary-gold-dark: #b18f1f;
        --neutral-50: #f8fafc;
        --neutral-100: #f1f5f9;
        --neutral-200: #e2e8f0;
        --neutral-300: #cbd5e1;
        --neutral-400: #94a3b8;
        --neutral-500: #64748b;
        --neutral-600: #475569;
        --neutral-700: #334155;
        --neutral-800: #1e293b;
        --neutral-900: #0f172a;
        --white: #ffffff;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        --radius-lg: 0.75rem;
        --radius-2xl: 1.5rem;
        --transition-base: 0.2s ease-out;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #111827;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        position: relative;
        padding: 8rem 0 6rem;
        overflow: hidden;
        background:
          radial-gradient(circle at 30% 20%, rgba(201, 162, 39, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.06) 0%, transparent 50%);
      }

      .hero-content {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.875rem 1.75rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 600;
        color: #c9a227;
        margin-bottom: 2.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .hero-badge svg {
        width: 16px;
        height: 16px;
      }

      .hero-title {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 1.5rem;
        letter-spacing: -0.025em;
        color: #0f172a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-display: optional;
      }

      .text-gradient {
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 50%, #c026d3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero-description {
        font-size: clamp(1.125rem, 2.5vw, 1.375rem);
        color: #475569;
        margin-bottom: 3rem;
        line-height: 1.6;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
      }

      .hero-cta {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 4rem;
      }

      .btn-hero {
        background: linear-gradient(135deg, #c9a227 0%, #b18f1f 100%);
        color: #ffffff;
        padding: 1rem 2.5rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 0.75rem;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease-out;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        position: relative;
        overflow: hidden;
      }

      .btn-hero:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      .btn-secondary-hero {
        background: #ffffff;
        color: #2563eb;
        border: 1px solid #cbd5e1;
        padding: 1rem 2.5rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.2s ease-out;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-secondary-hero:hover {
        background: #f1f5f9;
        border-color: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 2.5rem;
        max-width: 700px;
        margin: 0 auto;
        padding: 2.5rem 0;
        justify-items: center;
      }

      .stat-item {
        text-align: center;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 800;
        color: #2563eb;
        line-height: 1;
        margin-bottom: 0.5rem;
      }

      .stat-label {
        font-size: 0.875rem;
        color: #64748b;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      .navbar-spacer {
        height: 80px;
      }

      @media (max-width: 768px) {
        .hero-section {
          padding: 6rem 0 4rem;
        }

        .hero-content {
          padding: 0 1rem;
        }

        .hero-cta {
          flex-direction: column;
          align-items: center;
        }

        .btn-hero,
        .btn-secondary-hero {
          width: 100%;
          max-width: 300px;
        }

        .hero-stats {
          grid-template-columns: repeat(2, 1fr);
          gap: 1.5rem;
          padding: 2rem 0;
        }

        .container {
          padding: 0 1rem;
        }
      }

      @media (max-width: 480px) {
        .hero-stats {
          grid-template-columns: 1fr;
        }

        .stat-value {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <style>
      .hero-title {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 1.5rem;
        letter-spacing: -0.025em;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-display: optional;
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
